services:
  # ============================================
  # Jaeyify Backend Server
  # ============================================
  jaeyify:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jaeyify-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist database and uploaded music files
      - jaeyify-data:/app/data
      - jaeyify-music:/app/uploads/music
      - jaeyify-covers:/app/uploads/covers
      - jaeyify-avatars:/app/uploads/avatars
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-jaeyify-change-this-secret-key}
    # Upload limit: allow up to 500MB body size
    # (the app already limits individual files to 200MB)

volumes:
  jaeyify-data:
    driver: local
  jaeyify-music:
    driver: local
  jaeyify-covers:
    driver: local
  jaeyify-avatars:
    driver: local
