services:
  # ============================================
  # OwnSpotify Backend Server
  # ============================================
  ownspotify:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ownspotify-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist database and uploaded music files
      - ownspotify-data:/app/data
      - ownspotify-music:/app/uploads/music
      - ownspotify-covers:/app/uploads/covers
      - ownspotify-avatars:/app/uploads/avatars
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-ownspotify-change-this-secret-key}
    # Upload limit: allow up to 500MB body size
    # (the app already limits individual files to 200MB)

volumes:
  ownspotify-data:
    driver: local
  ownspotify-music:
    driver: local
  ownspotify-covers:
    driver: local
  ownspotify-avatars:
    driver: local
